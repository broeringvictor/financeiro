services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: financeiro
      POSTGRES_DB: financeiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d financeiro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
